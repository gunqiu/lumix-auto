name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 每天北京时间上午 9:00 运行 (UTC 1:00)

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqiu/Zampto-Renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本
        run: mv private/zampto_renew.py zampto_renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🛡️ 配置 WebShare 住宅代理
        run: |
          # 这里填你选的节点
          echo "LOCAL_PROXY=socks5://奈丹克尔:i9LLWB5UE1ZX@198.23.239.134:6540" >> $GITHUB_ENV
          echo "USE_PROXY=true" >> $GITHUB_ENV
          echo "✅ 已启用 WebShare 住宅代理"

          # 测试代理
          echo "🌐 当前出口 IP:"
          curl -s -x socks5h://奈丹克尔:i9LLWB5UE1ZX@198.23.239.134:6540 https://api.ipify.org

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zampto_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
