name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 每天北京时间 9:00 运行

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqiu/Zampto-Renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本
        run: mv private/zampto_renew.py zampto_renew.py

      - name: 🐍 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool
          pip install seleniumbase requests
          seleniumbase install chromedriver

      # ==============================================
      # 🔥 已替换为你的 VMess 代理（自动转 SOCKS5 10808）
      # ==============================================
      - name: 🛡️ 启动 VMess 代理
        run: |
          wget -q https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip
          unzip -q v2ray-linux-64.zip -d v2ray
          chmod +x v2ray/v2ray

          cat > config.json << EOF
          {
            "inbounds": [
              {
                "port": 10808,
                "listen": "127.0.0.1",
                "protocol": "socks",
                "settings": {
                  "auth": "noauth"
                }
              }
            ],
            "outbounds": [
              {
                "protocol": "vmess",
                "settings": {
                  "vnext": [
                    {
                      "address": "saas.sin.fan",
                      "port": 443,
                      "users": [
                        {
                          "id": "e4c1c8c0-1d79-4967-a139-03b30ccecc79",
                          "alterId": 0,
                          "security": "none"
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "ws",
                  "security": "tls",
                  "tlsSettings": {
                    "serverName": "godlike.ccuu.de5.net"
                  },
                  "wsSettings": {
                    "path": "/vmess-aegon?ed=2560",
                    "headers": {
                      "Host": "godlike.ccuu.de5.net"
                    }
                  }
                }
              }
            ]
          }
          EOF

          nohup ./v2ray/v2ray run -c config.json > v2ray.log 2>&1 &
          sleep 6
          echo "🌐 测试IP："
          curl -s -x socks5h://127.0.0.1:10808 https://api.ipify.org || echo "⚠️ 代理测试失败"
          echo -e "\n✅ VMess 就绪"

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          export USE_PROXY="true"
          echo "🌐 代理已启用"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zampto_renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
