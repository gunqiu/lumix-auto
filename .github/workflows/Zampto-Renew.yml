name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 每天北京时间 9:00 运行

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqiu/Zampto-Renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本
        run: mv private/zampto_renew.py zampto_renew.py

      - name: 🐍 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🛡️ 设置 WebShare 原生住宅代理
        run: |
          # 选其中一个节点用（推荐美国节点，和Zampto更匹配）
          echo "LOCAL_PROXY=socks5://naydancr:i9llwb5ue1zx@198.23.239.134:6540" >> $GITHUB_ENV
          echo "USE_PROXY=true" >> $GITHUB_ENV
          echo "✅ 已启用 WebShare 原生住宅代理"

          # 测试IP
          echo "🌐 当前出口 IP："
          curl -s -x socks5h://naydancr:i9llwb5ue1zx@198.23.239.134:6540 https://api.ipify.org || echo "⚠️ 代理测试失败"

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zampto_renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
