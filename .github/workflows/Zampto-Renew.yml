name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 每天北京时间 9:00 运行

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: gunqiu/Zampto-Renew   # 你的私库
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本
        run: mv private/zampto_renew.py zampto_renew.py

      - name: 🐍 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 安装依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🛡️ 启动 Xray 代理
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          if [ -z "$XRAY_CONFIG" ]; then
            echo "未配置 Xray，跳过代理"
          else
            wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
            unzip -q Xray-linux-64.zip -d xray_bin
            chmod +x xray_bin/xray
            echo "$XRAY_CONFIG" > xray_bin/config.json
            nohup ./xray_bin/xray run -c ./xray_bin/config.json > xray.log 2>&1 &
            sleep 4
            echo "🌐 测试IP："
            curl -s -x socks5h://127.0.0.1:10808 https://api.ipify.org || echo "⚠️ 代理测试失败，继续执行"
            echo -e "\n✅ Xray 就绪"
          fi

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          if [ -n "$XRAY_CONFIG" ]; then
            export USE_PROXY="true"
            echo "🌐 代理已启用"
          else
            export USE_PROXY="false"
          fi
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zampto_renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
